name: Cleanup merged ING import branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-ing-import.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Delete merged feature branch
        shell: bash
        run: git push origin --delete feature/ing-csv-import || true

      - name: Remove this temporary workflow
        shell: bash
        run: |
          rm .github/workflows/cleanup-ing-import.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/cleanup-ing-import.yml
          git commit -m "chore: remove temporary ING cleanup workflow"
          git push origin main
