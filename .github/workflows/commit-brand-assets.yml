name: Commit SpendFox brand assets

on:
  push:
    branches:
      - polish
    paths:
      - .github/workflows/commit-brand-assets.yml

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout polish branch
        uses: actions/checkout@v4
        with:
          ref: polish

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install image renderer
        run: npm install --no-save --package-lock=false sharp

      - name: Generate app assets
        run: node scripts/generate-brand-assets.mjs

      - name: Commit generated PNG files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/icon.png assets/adaptive-icon.png assets/spendfox-mark.png assets/favicon.png
          if git diff --cached --quiet; then
            echo "SpendFox assets are current."
            exit 0
          fi
          git commit -m "chore: commit SpendFox app assets"
          git push origin polish
