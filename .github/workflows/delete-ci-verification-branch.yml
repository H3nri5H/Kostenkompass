name: Delete temporary CI branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/delete-ci-verification-branch.yml

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Delete ci-verification branch
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/ci-verification'
            });
