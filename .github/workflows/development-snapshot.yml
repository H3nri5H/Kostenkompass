name: Finalize ING CSV import

on:
  pull_request:
    paths:
      - .github/workflows/development-snapshot.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Reassemble and apply patch
        shell: bash
        run: |
          cat .github/ing-import-patch.part* > /tmp/ing-import-patch.gz.b64
          base64 --decode /tmp/ing-import-patch.gz.b64 > /tmp/ing-import-patch.gz
          echo "dc7f545cc744cbf89a9e27e01555504f715f4484295d2604985b914524e06fd7  /tmp/ing-import-patch.gz" | sha256sum --check
          gzip --decompress --stdout /tmp/ing-import-patch.gz > /tmp/ing-import.patch
          git apply --check /tmp/ing-import.patch
          git apply --whitespace=nowarn /tmp/ing-import.patch

      - name: Correct optional purpose handling
        shell: bash
        run: |
          sed -i '/const parts = \[transaction.bookingText, transaction.purpose\]/,/\.map(normalizeWhitespace)/ s/    \.map(normalizeWhitespace)/    .filter((value): value is string => value !== null)\n    .map(normalizeWhitespace)/' src/domain/ing-csv.ts

      - name: Install dependencies
        run: npm ci

      - name: Apply safe lint fixes
        run: npx expo lint --fix

      - name: Format implementation
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --runInBand

      - name: Commit verified implementation
        shell: bash
        run: |
          rm -f .github/ing-import-patch.part*
          rm -f .github/workflows/development-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add ING CSV expense import"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
