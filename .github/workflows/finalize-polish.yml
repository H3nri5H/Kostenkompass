name: Finalize SpendFox polish branch

on:
  push:
    branches:
      - polish
    paths:
      - .github/workflows/finalize-polish.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout polish branch
        uses: actions/checkout@v4
        with:
          ref: polish

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install brand asset renderer
        run: npm install --no-save --package-lock=false sharp

      - name: Generate SpendFox assets
        run: node scripts/generate-brand-assets.mjs

      - name: Update package metadata
        run: |
          npm pkg set name=spendfox-mobile version=0.3.0
          npm install --package-lock-only --ignore-scripts

      - name: Format source files
        run: npm run format

      - name: Apply safe ESLint fixes
        run: npx expo lint --fix

      - name: Commit finalized files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "The polish branch is already finalized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: finalize SpendFox assets and formatting"
          git push origin polish
