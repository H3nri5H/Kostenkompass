name: Fix branding guard

on:
  push:
    branches:
      - polish
    paths:
      - .github/workflows/fix-branding-test.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout polish branch
        uses: actions/checkout@v4
        with:
          ref: polish

      - name: Exclude the guard from its own source scan
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/domain/__tests__/branding.test.ts')
          text = path.read_text()
          old = ".filter((path) => /\\.(ts|tsx)$/.test(path));"
          new = ".filter((path) => /\\.(ts|tsx)$/.test(path) && !path.endsWith('branding.test.ts'));"
          if old not in text:
              raise SystemExit('Expected branding test expression was not found.')
          path.write_text(text.replace(old, new))

      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/__tests__/branding.test.ts
          git commit -m "test: avoid self-matching branding guard"
          git push origin polish
