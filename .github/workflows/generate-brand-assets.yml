name: Generate SpendFox brand assets

on:
  push:
    branches:
      - polish
    paths:
      - branding/**
      - scripts/generate-brand-assets.mjs
      - .github/workflows/generate-brand-assets.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout polish branch
        uses: actions/checkout@v4
        with:
          ref: polish

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install image renderer
        run: npm install --no-save --package-lock=false sharp

      - name: Generate PNG assets
        run: node scripts/generate-brand-assets.mjs

      - name: Update package metadata
        run: |
          npm pkg set name=spendfox-mobile version=0.3.0
          npm install --package-lock-only --ignore-scripts

      - name: Commit generated files
        shell: bash
        run: |
          if git diff --quiet -- assets package.json package-lock.json; then
            echo "Generated files are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets package.json package-lock.json
          git commit -m "chore: generate SpendFox brand assets"
          git push origin polish
