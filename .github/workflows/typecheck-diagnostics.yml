name: TypeScript diagnostics

on:
  push:
    branches:
      - polish

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture TypeScript diagnostics
        shell: bash
        run: npm run typecheck > typecheck-errors.txt 2>&1 || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck-errors.txt
          if-no-files-found: error
          retention-days: 1
